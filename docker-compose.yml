version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./data/predictions.db
    volumes:
      - ./backend/data:/app/data
      - ./backend:/app
    restart: unless-stopped
    stdin_open: true
    tty: true

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
