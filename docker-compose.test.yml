version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pais
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pais
      REDIS_URL: redis://redis:6379/0
      PORT: 8000
      ENVIRONMENT: development
      SECRET_KEY: test-secret-key-for-development
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs:/app/logs
    command: >
      sh -c "echo 'Waiting for database...' &&
             sleep 5 &&
             uvicorn backend.main:app --host 0.0.0.0 --port 8000 --log-level debug"

volumes:
  postgres_data:
